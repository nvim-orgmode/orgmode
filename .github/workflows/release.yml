# on:
#   workflow_dispatch:
#     inputs:
#       version:
#         type: string
#         description: 'Version'
#         required: true
on:
  push:
    branches:
      - feat/changelog

permissions:
  contents: write
  pull-requests: write

name: release

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        id: neovim
        with:
          neovim: true
          version: v0.10.3
      - name: Update changelog
        run: |
          nvim -l scripts/generate_changelog.lua 0.4.2
          # nvim -l scripts/generate_changelog.lua ${{ github.event.inputs.version }}
      - name: Print generated changelog
        run: |
          cat docs/changelog.org
      - name: Get release info
        id: release_info
        run: |
          echo "RELEASE_INFO=$(nvim -l scripts/generate_changelog.lua 0.4.2 print)" >> $GITHUB_OUTPUT
      - name: Print release info
        run:
          echo ${{ steps.release_info.outputs.RELEASE_INFO }}
